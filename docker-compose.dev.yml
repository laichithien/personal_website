name: personal_website_dev

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: personal_postgres_dev
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-ai_agent_db}
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
      - ./infrastructure/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5452:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-ai_agent_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    image: personal-api:dev
    build:
      context: .
      dockerfile: ./apps/ai-service/Dockerfile
      target: base
    container_name: personal_api_dev
    restart: unless-stopped
    working_dir: /app
    command: >
      sh -c "uvicorn src.main:app --reload --host 0.0.0.0 --port 8000"
    volumes:
      - ./apps/ai-service/src:/app/src
      - ./apps/ai-service/requirements.txt:/app/requirements.txt:ro
      - ./scripts:/app/scripts
      - ./uploads:/app/uploads
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-ai_agent_db}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://openrouter.ai/api/v1}
      DEBUG: ${DEBUG:-true}
      CORS_ORIGINS_STR: ${CORS_ORIGINS_STR:-http://localhost:3343,http://localhost:3000}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      DEFAULT_ADMIN_PASSWORD: ${DEFAULT_ADMIN_PASSWORD:-admin123}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-dev-secret-key}
      COOKIE_DOMAIN: ${COOKIE_DOMAIN:-}
      PYTHONPATH: /app
    ports:
      - "3344:8000"
    depends_on:
      postgres:
        condition: service_healthy

  web:
    image: personal-web:dev
    build:
      context: .
      dockerfile: ./apps/web/Dockerfile
      target: base
    container_name: personal_web_dev
    restart: unless-stopped
    working_dir: /app
    command: >
      sh -c "pnpm install && pnpm dev --hostname 0.0.0.0 --port 3000"
    volumes:
      - ./apps/web:/app
      - web_node_modules:/app/node_modules
    environment:
      NODE_ENV: development
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3344}
      NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-http://localhost:3343}
      API_URL: http://api:8000
    ports:
      - "3343:3000"
    depends_on:
      - api

volumes:
  postgres_dev_data:
    name: personal-postgres-data-dev
  web_node_modules:
    name: personal-web-node-modules-dev
