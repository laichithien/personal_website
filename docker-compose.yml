name: personal_website
services:
  # --- Backend API ---
  api:
    image: personal-api:prod
    build:
      context: .
      dockerfile: ./apps/ai-service/Dockerfile
      target: production
    container_name: personal_api
    restart: unless-stopped
    # [QUAN TRỌNG] Map thư mục upload ra ngoài để không mất dữ liệu khi update
    volumes:
      - ./uploads:/app/uploads
    environment:
      # Database Connection (Lấy từ .env)
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@${POSTGRES_HOST}:${POSTGRES_PORT}/${POSTGRES_DB}
      # AI Config
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://openrouter.ai/api/v1}
      ENVIRONMENT: ${ENVIRONMENT:-production}
      DEBUG: ${DEBUG:-false}
      # Security & CORS
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      CORS_ORIGINS_STR: ${CORS_ORIGINS_STR}
      COOKIE_DOMAIN: ${COOKIE_DOMAIN}
      # Admin Setup
      ADMIN_USERNAME: ${ADMIN_USERNAME}
      DEFAULT_ADMIN_PASSWORD: ${DEFAULT_ADMIN_PASSWORD}
    networks:
      - main-network
  # --- Frontend Web ---
  web:
    image: personal-web:prod
    build:
      context: .
      dockerfile: ./apps/web/Dockerfile
      target: runner
      # [QUAN TRỌNG] Nạp biến môi trường vào lúc BUILD IMAGE (Next.js cần cái này)
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
        NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL}
    container_name: personal_web
    restart: unless-stopped
    environment:
      NODE_ENV: production
      # Internal network URL (Web gọi API qua mạng Docker)
      API_URL: http://personal_api:8000
    ports:
      - 3333:3000
    depends_on:
      - api
    networks:
      - main-network
# Kết nối vào mạng chung của Server (Nơi có Postgres-main và Tunnel)
networks:
  main-network:
