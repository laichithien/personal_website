# Production Docker Compose for Transparent Core
# Usage: docker compose -f docker-compose.prod.yml up -d
# Note: Use this file ALONE for production (not with docker-compose.yml)

name: transparent-core

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: tc-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-ai_agent_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infrastructure/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5442:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-ai_agent_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    image: transparent-core-api:prod
    build:
      context: ./apps/ai-service
      dockerfile: Dockerfile
      target: production
    container_name: tc-api
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-ai_agent_db}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://openrouter.ai/api/v1}
      ENVIRONMENT: production
      DEBUG: "false"
      CORS_ORIGINS_STR: ${CORS_ORIGINS_STR:-https://yourdomain.com,https://www.yourdomain.com}
    # No volumes - use the built image
    ports:
      - "3334:8000"
    depends_on:
      postgres:
        condition: service_healthy

  web:
    image: transparent-core-web:prod
    build:
      context: ./apps/web
      dockerfile: Dockerfile
      target: runner  # Production build
      args:
        # NEXT_PUBLIC_* vars are embedded at build time
        NEXT_PUBLIC_API_URL: https://api.yourdomain.com
        NEXT_PUBLIC_SITE_URL: https://yourdomain.com
    container_name: tc-web
    restart: unless-stopped
    environment:
      NODE_ENV: production
      # Internal Docker URL for server-side rendering
      API_URL: http://api:8000
    # No volumes - use the built image
    ports:
      - "3333:3000"
    depends_on:
      - api

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: tc-cloudflared
    restart: unless-stopped
    command: tunnel run
    volumes:
      - ./infrastructure/cloudflared/config.yml:/etc/cloudflared/config.yml:ro
      - ./infrastructure/cloudflared/credentials.json:/etc/cloudflared/credentials.json:ro
    depends_on:
      - web
      - api

volumes:
  postgres_data:
    name: tc-postgres-data
